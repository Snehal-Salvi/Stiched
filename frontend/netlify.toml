[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the Render backend.
# Replace BACKEND_URL below with your actual Render URL after Phase 6.
[[redirects]]
  from = "/api/*"
  to = "https://BACKEND_URL.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback so React Router handles client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
