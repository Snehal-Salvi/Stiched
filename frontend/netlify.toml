[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the Render backend.
[[redirects]]
  from = "/api/*"
  to = "https://stiched.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback so React Router handles client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
